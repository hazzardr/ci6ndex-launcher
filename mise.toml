[tools]
go = "1.26.2"
node = "latest"
golangci-lint = "2"

[tasks.lint]
description = "Run golangci-lint on all Go modules"
run = """
#!/usr/bin/env bash
set -euo pipefail
cd pkg/shared && golangci-lint run ./...
cd ../../apps/launcher && golangci-lint run ./...
"""

[tasks.dev]
description = "Run the Wails dev server for the launcher app"
run = "cd apps/launcher && wails dev"
